<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF to Text - แปลง PDF เป็นข้อความ</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            color: #e0e0e0;
        }
        .container { max-width: 1100px; margin: 0 auto; padding: 40px 20px; display: flex; gap: 32px; align-items: flex-start; }
        .main-content { flex: 1; min-width: 0; }
        .sidebar {
            width: 240px;
            flex-shrink: 0;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 24px;
            text-align: center;
            backdrop-filter: blur(10px);
            position: sticky;
            top: 40px;
        }
        .sidebar h3 { font-size: 1rem; margin-bottom: 12px; color: #00d2ff; }
        .sidebar img { width: 160px; height: 160px; border-radius: 12px; border: 2px solid rgba(255,255,255,0.15); }
        .sidebar p { font-size: 0.8rem; color: #888; margin-top: 12px; }
        h1 {
            text-align: center;
            font-size: 2.2rem;
            margin-bottom: 8px;
            background: linear-gradient(90deg, #00d2ff, #7b2ff7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .subtitle { text-align: center; color: #888; margin-bottom: 36px; font-size: 0.95rem; }
        .card {
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 32px;
            backdrop-filter: blur(10px);
            margin-bottom: 24px;
        }
        .upload-zone {
            border: 2px dashed rgba(255,255,255,0.2);
            border-radius: 12px;
            padding: 48px 24px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
        }
        .upload-zone:hover, .upload-zone.dragover {
            border-color: #7b2ff7;
            background: rgba(123, 47, 247, 0.08);
        }
        .upload-zone .icon { font-size: 3rem; margin-bottom: 12px; }
        .upload-zone p { color: #aaa; margin-top: 8px; }
        .upload-zone .filename {
            color: #00d2ff;
            font-weight: 600;
            font-size: 1.1rem;
            margin-top: 12px;
        }
        input[type="file"] { display: none; }
        .options { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-top: 20px; }
        .option-group label {
            display: block;
            font-size: 0.85rem;
            color: #999;
            margin-bottom: 6px;
        }
        .option-group input, .option-group select {
            width: 100%;
            padding: 10px 14px;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.15);
            background: rgba(255,255,255,0.05);
            color: #fff;
            font-size: 0.95rem;
            outline: none;
            transition: border 0.3s;
        }
        .option-group input:focus, .option-group select:focus {
            border-color: #7b2ff7;
        }
        .option-group input::placeholder { color: #555; }
        .btn {
            display: block;
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 10px;
            font-size: 1.05rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 24px;
        }
        .btn-primary {
            background: linear-gradient(135deg, #7b2ff7, #00d2ff);
            color: #fff;
        }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(123,47,247,0.3); }
        .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; transform: none; box-shadow: none; }
        .btn-download {
            background: linear-gradient(135deg, #00b09b, #96c93d);
            color: #fff;
            margin-top: 16px;
        }
        .btn-download:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(0,176,155,0.3); }
        .status {
            text-align: center;
            padding: 16px;
            border-radius: 10px;
            margin-top: 20px;
            font-size: 0.95rem;
            display: none;
        }
        .status.loading { display: block; background: rgba(123,47,247,0.15); color: #b388ff; }
        .status.success { display: block; background: rgba(0,176,155,0.15); color: #69f0ae; }
        .status.error { display: block; background: rgba(244,67,54,0.15); color: #ef9a9a; }
        .spinner {
            display: inline-block;
            width: 18px; height: 18px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            vertical-align: middle;
            margin-right: 8px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .result-info {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-top: 16px;
        }
        .result-info .stat {
            background: rgba(255,255,255,0.05);
            border-radius: 8px;
            padding: 12px;
            text-align: center;
        }
        .result-info .stat .num { font-size: 1.5rem; font-weight: 700; color: #00d2ff; }
        .result-info .stat .lbl { font-size: 0.75rem; color: #888; margin-top: 4px; }
        .preview {
            background: rgba(0,0,0,0.3);
            border-radius: 10px;
            padding: 16px;
            margin-top: 16px;
            max-height: 300px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 0.85rem;
            line-height: 1.6;
            color: #ccc;
            white-space: pre-wrap;
            word-break: break-all;
        }
        .preview::-webkit-scrollbar { width: 6px; }
        .preview::-webkit-scrollbar-track { background: transparent; }
        .preview::-webkit-scrollbar-thumb { background: #555; border-radius: 3px; }
        footer { text-align: center; color: #555; font-size: 0.8rem; margin-top: 40px; }
        @media (max-width: 600px) {
            .options { grid-template-columns: 1fr; }
            .result-info { grid-template-columns: 1fr; }
            h1 { font-size: 1.6rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="main-content">
            <h1>PDF to Text</h1>
            <p class="subtitle">แปลงไฟล์ PDF เป็นข้อความ รองรับ OCR ภาษาไทย</p>

        <div class="card">
            <div class="upload-zone" id="dropZone">
                <div class="icon">&#128196;</div>
                <p><strong>ลากไฟล์ PDF มาวางที่นี่</strong></p>
                <p>หรือคลิกเพื่อเลือกไฟล์</p>
                <div class="filename" id="fileName"></div>
                <input type="file" id="fileInput" accept=".pdf">
            </div>

            <div class="options">
                <div class="option-group">
                    <label>หน้าที่ต้องการ (ว่าง = ทุกหน้า)</label>
                    <input type="text" id="pages" placeholder="เช่น 1,2,3 หรือ 1-5">
                </div>
                <div class="option-group">
                    <label>ภาษา OCR</label>
                    <select id="lang">
                        <option value="tha+eng">ไทย + อังกฤษ</option>
                        <option value="tha">ไทยเท่านั้น</option>
                        <option value="eng">อังกฤษเท่านั้น</option>
                    </select>
                </div>
            </div>

            <button class="btn btn-primary" id="convertBtn" disabled>แปลง PDF เป็น Text</button>

            <div class="status" id="status"></div>
        </div>

        <div class="card" id="resultCard" style="display:none;">
            <div class="result-info">
                <div class="stat"><div class="num" id="rPages">-</div><div class="lbl">จำนวนหน้า</div></div>
                <div class="stat"><div class="num" id="rMethod">-</div><div class="lbl">วิธีแปลง</div></div>
                <div class="stat"><div class="num" id="rSize">-</div><div class="lbl">ขนาดข้อความ</div></div>
            </div>
            <div class="preview" id="preview"></div>
            <button class="btn btn-download" id="downloadBtn">ดาวน์โหลดไฟล์ .txt</button>
        </div>

        <footer>Made with &#10084; by Bonus Agent</footer>
        </div>

        <div class="sidebar">
            <h3>☕ สนับสนุนเรา</h3>
            <img src="/static/donate-qr.jpg" alt="QR Code รับบริจาค">
            <p>สแกน QR เพื่อ<br>สนับสนุนทางการเงิน</p>
        </div>
    </div>

    <script>
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const fileName = document.getElementById('fileName');
        const convertBtn = document.getElementById('convertBtn');
        const status = document.getElementById('status');
        const resultCard = document.getElementById('resultCard');
        let selectedFile = null;
        let downloadId = null;

        dropZone.addEventListener('click', () => fileInput.click());
        dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
        dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
        dropZone.addEventListener('drop', e => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            if (e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]);
        });
        fileInput.addEventListener('change', e => { if (e.target.files.length) handleFile(e.target.files[0]); });

        function handleFile(file) {
            if (!file.name.toLowerCase().endsWith('.pdf')) {
                alert('กรุณาเลือกไฟล์ .pdf เท่านั้น');
                return;
            }
            selectedFile = file;
            fileName.textContent = file.name + ' (' + (file.size / 1024 / 1024).toFixed(2) + ' MB)';
            convertBtn.disabled = false;
        }

        convertBtn.addEventListener('click', async () => {
            if (!selectedFile) return;

            const formData = new FormData();
            formData.append('pdf', selectedFile);
            formData.append('pages', document.getElementById('pages').value);
            formData.append('lang', document.getElementById('lang').value);

            convertBtn.disabled = true;
            status.className = 'status loading';
            status.innerHTML = '<span class="spinner"></span>กำลังแปลง...';
            resultCard.style.display = 'none';

            try {
                const res = await fetch('/convert', { method: 'POST', body: formData });
                const data = await res.json();

                if (data.success) {
                    status.className = 'status success';
                    status.textContent = 'แปลงสำเร็จ!';
                    downloadId = data.download_id;

                    document.getElementById('rPages').textContent = data.converted_pages;
                    document.getElementById('rMethod').textContent = data.method;
                    document.getElementById('rSize').textContent = (data.preview.length / 1024).toFixed(1) + ' KB';
                    document.getElementById('preview').textContent = data.preview;
                    resultCard.style.display = 'block';
                } else {
                    status.className = 'status error';
                    status.textContent = data.error;
                }
            } catch (err) {
                status.className = 'status error';
                status.textContent = 'เกิดข้อผิดพลาดในการเชื่อมต่อ';
            }

            convertBtn.disabled = false;
        });

        document.getElementById('downloadBtn').addEventListener('click', () => {
            if (downloadId) window.location.href = '/download/' + downloadId;
        });
    </script>
</body>
</html>
